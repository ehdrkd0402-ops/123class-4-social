<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>국가유산 배움터</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; text-align: center; }
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .content { padding: 15px; }
    </style>
</head>
<body>
    <h1>🇰🇷 국가유산 배움터</h1>
    <div id="heritage-container" class="container">데이터를 불러오는 중...</div>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTRxczjuFsTmotGcJMSOFEdn4NZ-NiHjcPrsTaC7UJw835lLTk1p1rmdowYrLBX8x3nUWgd1bwxclfI/pub?output=csv';

        async function loadData() {
            try {
                const res = await fetch(sheetUrl);
                const text = await res.text();
                const rows = text.split('\n').slice(1);
                const container = document.getElementById('heritage-container');
                container.innerHTML = '';

                rows.forEach(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length >= 4) {
                        const cat = cols[0].replace(/"/g, "");
                        const name = cols[1].replace(/"/g, "");
                        const desc = cols[2].replace(/"/g, "");
                        const img = cols[3].trim().replace(/"/g, "");
                        container.innerHTML += `
                            <div class="card">
                                <img src="${img}" onerror="this.src='https://via.placeholder.com/400x200?text=사진준비중'">
                                <div class="content">
                                    <small>${cat}</small>
                                    <h3>${name}</h3>
                                    <p>${desc}</p>
                                </div>
                            </div>`;
                    }
                });
            } catch (e) {
                document.getElementById('heritage-container').innerText = '데이터 로드 실패';
            }
        }
        loadData();
    </script>
</body>
</html>
