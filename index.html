<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>국가유산 배움터</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 40px; }
        .category-section { max-width: 1200px; margin: 0 auto 50px; }
        .category-title { border-left: 5px solid #3498db; padding-left: 15px; margin-bottom: 20px; color: #34495e; font-size: 1.5rem; }
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 200px; object-fit: cover; background: #eee; }
        .card-content { padding: 15px; }
        .card-content h3 { margin: 10px 0; font-size: 1.2rem; }
        .card-content p { color: #666; font-size: 0.95rem; line-height: 1.5; }
    </style>
</head>
<body>
    <h1>🇰🇷 국가유산 배움터</h1>
    <div id="main-content">데이터를 불러오는 중입니다...</div>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTRxczjuFsTmotGcJMSOFEdn4NZ-NiHjcPrsTaC7UJw835lLTk1p1rmdowYrLBX8x3nUWgd1bwxclfI/pub?output=csv';

        async function loadData() {
            try {
                const response = await fetch(sheetUrl);
                const csvText = await response.text();
                const rows = csvText.split('\n').filter(row => row.trim() !== '').slice(1);
                
                const mainContent = document.getElementById('main-content');
                mainContent.innerHTML = '';

                // 1. 데이터를 분류별로 묶기
                const groups = {};
                rows.forEach(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length < 4) return;
                    
                    const category = cols[0].replace(/"/g, "").trim();
                    if (!groups[category]) groups[category] = [];
                    groups[category].push({
                        name: cols[1].replace(/"/g, ""),
                        desc: cols[2].replace(/"/g, ""),
                        img: cols[3].trim().replace(/"/g, "")
                    });
                });

                // 2. 분류별로 화면에 그리기
                for (const category in groups) {
                    const section = document.createElement('div');
                    section.className = 'category-section';
                    
                    let cardsHtml = '';
                    groups[category].forEach(item => {
                        cardsHtml += `
                            <div class="card">
                                <img src="${item.img}" onerror="this.src='https://via.placeholder.com/400x250?text=사진준비중'">
                                <div class="card-content">
                                    <h3>${item.name}</h3>
                                    <p>${item.desc}</p>
                                </div>
                            </div>`;
                    });

                    section.innerHTML = `
                        <h2 class="category-title">${category}</h2>
                        <div class="container">${cardsHtml}</div>
                    `;
                    mainContent.appendChild(section);
                }
            } catch (e) {
                document.getElementById('main-content').innerText = "데이터 로딩 실패";
            }
        }
        loadData();
    </script>
</body>
</html>
